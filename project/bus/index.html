<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>九巴班次顯示</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f5;
    --primary: #c0392b;
    --primary-dim: #fde8e6;
    --primary-border: #f5c6c2;
    --green: #15803d;
    --green-bg: #dcfce7;
    --green-border: #86efac;
    --orange: #c2410c;
    --orange-bg: #fff7ed;
    --orange-border: #fed7aa;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-border: #fecaca;
    --card-bg: #ffffff;
    --border: #e0e3e8;
    --text: #1a1a2e;
    --muted: #9ca3af;
    --btn-bg: #e8eaed;
    --btn-active: #d1d5db;
    --header-bg: #ffffff;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ── Screens ── */
  .screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
  .screen.active { display: flex; }

  /* ════════════════════════════════════════
     SCREEN 1 — SELECTION
  ════════════════════════════════════════ */
  #sel-screen { padding: 12px; gap: 10px; }

  .sel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex: 0 0 auto;
  }

  .sel-header h1 {
    font-size: 1rem;
    color: var(--primary);
    font-weight: 700;
    letter-spacing: 1px;
  }

  #btn-goto-board {
    font-size: 0.8rem;
    padding: 7px 16px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    touch-action: manipulation;
    box-shadow: var(--shadow);
  }

  /* Typed route display */
  .sel-input-area {
    flex: 0 0 auto;
    background: var(--card-bg);
    border: 2px solid var(--primary-border);
    border-radius: 10px;
    padding: 12px 16px;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    box-shadow: var(--shadow);
  }

  #typed-display {
    font-size: 2rem;
    letter-spacing: 4px;
    color: var(--primary);
    font-weight: 700;
    min-width: 80px;
  }

  #valid-badge {
    font-size: 0.78rem;
    color: var(--green);
    font-weight: 600;
  }

  /* Route match list */
  #route-matches {
    flex: 1 1 0;
    overflow-y: auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--card-bg);
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow-x: hidden;
  }

  .rli-loading {
    color: var(--muted);
    font-size: 0.8rem;
    padding: 16px;
    text-align: center;
  }

  .rli {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    gap: 12px;
  }

  .rli:last-child { border-bottom: none; }
  .rli:active { background: #f9fafb; }

  .rli-num {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--primary);
    min-width: 60px;
    letter-spacing: 0.5px;
  }

  .rli-dests {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .rli-dest {
    font-size: 0.82rem;
    color: var(--text);
  }

  .rli-dest.inbound { color: var(--muted); }

  .rli-company {
    font-size: 0.62rem;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 4px;
    flex-shrink: 0;
    letter-spacing: 0.3px;
    align-self: center;
  }
  .rli-kmb { background: var(--primary-dim); color: var(--primary); border: 1px solid var(--primary-border); }
  .rli-ctb { background: #e8f0fd; color: #1a56db; border: 1px solid #b4c8fa; }

  .board-company {
    font-size: 0.58rem;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 3px;
    vertical-align: middle;
    margin-left: 4px;
    position: relative;
    top: -2px;
  }
  .board-kmb { background: var(--primary-dim); color: var(--primary); }
  .board-ctb { background: #e8f0fd; color: #1a56db; }

  /* Numpad — always anchored to bottom, never pushed by list */
  .sel-numpad {
    flex: 0 0 auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 7px;
    background: var(--bg);
    padding-top: 6px;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .numpad-digits {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .numpad-letters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }

  button.key {
    background: var(--btn-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1.2rem;
    font-family: inherit;
    padding: 13px 8px;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    transition: background 0.08s;
    -webkit-tap-highlight-color: transparent;
    font-weight: 500;
    box-shadow: var(--shadow);
  }

  button.key:active { background: var(--btn-active); }

  button.key.dim { color: var(--muted); border-color: #e8eaed; box-shadow: none; }

  button.key.letter { padding: 10px 14px; font-size: 1rem; }

  button.key.clr { color: var(--red); }
  button.key.bsp { color: #6b7280; }

  #btn-add-route {
    background: var(--btn-bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 1rem;
    font-family: inherit;
    padding: 13px;
    cursor: not-allowed;
    touch-action: manipulation;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-weight: 600;
  }

  #btn-add-route.enabled {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
    cursor: pointer;
    box-shadow: var(--shadow);
  }

  /* ════════════════════════════════════════
     SCREEN 2 — STOP PICKER
  ════════════════════════════════════════ */
  #stop-screen { padding: 0; }

  .stop-header {
    flex: 0 0 auto;
    background: var(--header-bg);
    border-bottom: 2px solid var(--primary-border);
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: var(--shadow);
  }

  .stop-header-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stop-header-top-left { display: flex; align-items: center; gap: 8px; flex: 1; }

  #stop-back {
    background: var(--btn-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.9rem;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    touch-action: manipulation;
    flex-shrink: 0;
  }

  #stop-home {
    background: var(--primary);
    border: none;
    color: #fff;
    font-size: 0.85rem;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    touch-action: manipulation;
    flex-shrink: 0;
    font-weight: 600;
  }

  #stop-home:active { opacity: 0.82; }

  #stop-route-label {
    font-size: 1.3rem;
    color: var(--primary);
    font-weight: 700;
    letter-spacing: 1px;
  }

  .stop-dir-hint {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .dir-tabs { display: flex; gap: 6px; }

  .dir-tab {
    flex: 1;
    background: var(--btn-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.85rem;
    padding: 8px;
    cursor: pointer;
    touch-action: manipulation;
    font-weight: 500;
  }

  .dir-tab.active {
    background: var(--primary-dim);
    border-color: var(--primary);
    color: var(--primary);
    font-weight: 600;
  }

  #stop-list {
    flex: 1 1 0;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .stop-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;        /* never compress — scroll instead */
    -webkit-tap-highlight-color: transparent;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .stop-item:active { background: #fafafa; }

  .stop-item.stop-expanded {
    border-color: var(--primary);
    background: var(--primary-dim);
  }

  .stop-item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    height: 52px;          /* fixed tile height for non-expanded row */
    flex-shrink: 0;
  }

  .stop-seq {
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 22px;
    text-align: right;
    font-weight: 500;
    flex-shrink: 0;
  }

  .stop-names { flex: 1; min-width: 0; }

  .stop-name-tc { font-size: 0.95rem; color: var(--text); font-weight: 500; }
  .stop-name-en { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }

  .stop-eta-mini {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--green);
    flex-shrink: 0;
    min-width: 30px;
    text-align: right;
  }

  .stop-eta-mini.soon { color: var(--orange); }
  .stop-eta-mini.now  { color: var(--red); }
  .stop-eta-mini.loading { color: var(--muted); font-weight: 400; }

  .stop-eta-detail {
    padding: 4px 14px 12px 48px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .stop-star {
    background: none;
    border: none;
    font-size: 1.35rem;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 4px;
    touch-action: manipulation;
    line-height: 1;
    flex-shrink: 0;
  }

  .stop-star:active { color: #f59e0b; }

  .stop-loading {
    color: var(--muted);
    text-align: center;
    padding: 40px;
    font-size: 0.9rem;
  }

  /* Opposite direction tile */
  .stop-flip-tile {
    background: var(--btn-bg);
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    touch-action: manipulation;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    margin-top: 4px;
  }
  .stop-flip-tile:active { background: var(--btn-active); }
  .stop-flip-arrow { font-size: 1.3rem; color: var(--muted); flex-shrink: 0; }
  .stop-flip-info { display: flex; flex-direction: column; gap: 1px; flex: 1; }
  .stop-flip-label { font-size: 0.68rem; color: var(--muted); }
  .stop-flip-dest { font-size: 0.95rem; color: var(--primary); font-weight: 600; }

  /* ════════════════════════════════════════
     SCREEN 3 — DEPARTURE BOARD
  ════════════════════════════════════════ */
  #disp-screen { padding: 0; }

  .board-header {
    flex: 0 0 auto;
    background: var(--header-bg);
    border-bottom: 2px solid var(--primary-border);
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }

  .board-title {
    font-size: 0.95rem;
    color: var(--primary);
    font-weight: 700;
    letter-spacing: 1px;
  }

  .board-header-btns { display: flex; gap: 8px; align-items: center; }

  #last-update { font-size: 0.65rem; color: var(--muted); }

  #btn-board-edit {
    background: none;
    border: 1px solid var(--primary-border);
    color: var(--primary);
    font-family: inherit;
    font-size: 0.8rem;
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    touch-action: manipulation;
    font-weight: 500;
  }

  #btn-board-edit:active { background: var(--primary-dim); }

  #btn-board-add {
    background: var(--primary);
    border: none;
    color: #fff;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(192,57,43,0.35);
  }

  #btn-board-add:active { opacity: 0.82; }

  #board-rows {
    flex: 1 1 0;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .board-empty {
    color: var(--muted);
    text-align: center;
    padding: 60px 20px;
    font-size: 0.9rem;
    line-height: 2;
  }

  .board-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    border-radius: 8px;
    padding: 12px 14px;
    position: relative;
    box-shadow: var(--shadow);
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .board-card:active { background: #fafafa; }
  .board-card.starred-card { background: #fffbf0; border-left-color: #f59e0b; }

  .board-card-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 3px;
    padding-right: 36px;
  }

  .board-route {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.5px;
    min-width: 64px;
  }

  .board-dest {
    font-size: 0.88rem;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }

  .board-card-stop {
    font-size: 0.68rem;
    color: var(--muted);
    margin-bottom: 8px;
    padding-right: 36px;
  }

  .board-etas { display: flex; gap: 7px; flex-wrap: wrap; }

  .eta-pill {
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--green);
    min-width: 56px;
    text-align: center;
  }

  .eta-pill.soon {
    background: var(--orange-bg);
    border-color: var(--orange-border);
    color: var(--orange);
  }

  .eta-pill.now {
    background: var(--red-bg);
    border-color: var(--red-border);
    color: var(--red);
  }

  .eta-pill.no-data {
    background: #f9fafb;
    border-color: var(--border);
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 400;
  }

  .board-star {
    position: absolute;
    top: 9px;
    right: 9px;
    background: none;
    border: none;
    font-size: 1.25rem;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 4px;
    touch-action: manipulation;
    line-height: 1;
    z-index: 1;
  }

  .board-star.starred { color: #f59e0b; }

  .board-del {
    background: none;
    border: 1px solid #fca5a5;
    color: var(--red);
    font-size: 0.72rem;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    touch-action: manipulation;
    display: none;
    margin-top: 6px;
  }

  .edit-mode .board-del { display: inline-block; }

  /* ── Offline banner ── */
  #offline-banner {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--red);
    color: #fff;
    text-align: center;
    padding: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    z-index: 999;
  }

  #offline-banner.show { display: block; }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-left: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ════════════════════════════════════════
     RESPONSIVE — compact for landscape / small screens
  ════════════════════════════════════════ */
  @media (max-height: 520px), (orientation: landscape) {
    /* Stop list: tighter rows */
    .stop-item-row { padding: 0 12px; height: 42px; }
    .stop-name-tc  { font-size: 0.85rem; }
    .stop-name-en  { font-size: 0.62rem; }
    .stop-eta-detail { padding: 3px 12px 8px 36px; gap: 6px; }
    .stop-loading  { padding: 20px; }
    #stop-list     { gap: 3px; padding: 5px; }

    /* Board cards: tighter */
    .board-card    { padding: 8px 12px; }
    .board-route   { font-size: 1.2rem; min-width: 52px; }
    .board-dest    { font-size: 0.8rem; }
    .board-card-stop { font-size: 0.62rem; margin-bottom: 5px; }
    .board-etas    { gap: 5px; }
    .eta-pill      { padding: 4px 10px; font-size: 0.88rem; min-width: 48px; }
    #board-rows    { gap: 5px; padding: 5px; }

    /* Selection screen: tighter numpad */
    button.key     { padding: 10px 6px; font-size: 1.05rem; }
    button.key.letter { padding: 8px 10px; font-size: 0.9rem; }
    .sel-input-area { min-height: 46px; padding: 8px 14px; }
    #typed-display { font-size: 1.6rem; }
    #sel-screen    { gap: 7px; padding: 8px; }
    .sel-numpad    { gap: 5px; }
    .numpad-digits { gap: 4px; }
    .numpad-letters { gap: 4px; }
    #btn-add-route { padding: 10px; }

    /* Headers */
    .stop-header   { padding: 7px 12px; gap: 6px; }
    .board-header  { padding: 6px 12px; }
    .dir-tab       { padding: 6px; font-size: 0.8rem; }
  }

  /* Landscape two-column for selection screen */
  @media (orientation: landscape) and (max-height: 520px) {
    #sel-screen {
      flex-direction: row;
      flex-wrap: wrap;
    }
    .sel-header    { flex: 0 0 100%; }
    .sel-input-area { flex: 0 0 100%; }
    #route-matches { flex: 1 1 0; min-height: 0; }
    .sel-numpad    { flex: 0 0 auto; width: 220px; }
  }
</style>
</head>
<body>

<!-- ════════ SCREEN 1: 路線搜尋 ════════ -->
<div id="sel-screen" class="screen active">
  <div class="sel-header">
    <h1>九巴 ● 路線搜尋</h1>
    <button type="button" id="btn-goto-board">班次板 ▶</button>
  </div>

  <div class="sel-input-area">
    <span id="typed-display">_</span>
    <span id="valid-badge"></span>
  </div>

  <div id="route-matches"></div>

  <div class="sel-numpad">
    <div class="numpad-letters" id="numpad-letters"></div>
    <div class="numpad-digits" id="numpad-digits">
      <button type="button" class="key" data-k="7">7</button>
      <button type="button" class="key" data-k="8">8</button>
      <button type="button" class="key" data-k="9">9</button>
      <button type="button" class="key" data-k="4">4</button>
      <button type="button" class="key" data-k="5">5</button>
      <button type="button" class="key" data-k="6">6</button>
      <button type="button" class="key" data-k="1">1</button>
      <button type="button" class="key" data-k="2">2</button>
      <button type="button" class="key" data-k="3">3</button>
      <button type="button" class="key clr" data-k="CLR">清除</button>
      <button type="button" class="key" data-k="0">0</button>
      <button type="button" class="key bsp" data-k="BSP">&#9003;</button>
    </div>
    <div>
      <button type="button" id="btn-add-route" style="width:100%">確認新增</button>
    </div>
  </div>
</div>

<!-- ════════ SCREEN 2: 站點選擇 ════════ -->
<div id="stop-screen" class="screen">
  <div class="stop-header">
    <div class="stop-header-top">
      <div class="stop-header-top-left">
        <button type="button" id="stop-back">← 返回</button>
        <span id="stop-route-label"></span>
      </div>
      <button type="button" id="stop-home">班次板 ▶</button>
    </div>
    <div class="dir-tabs" id="dir-tabs"></div>
    <div class="stop-dir-hint">點選站點以顯示到站時間</div>
  </div>
  <div id="stop-list"></div>
</div>

<!-- ════════ SCREEN 3: 班次顯示板 ════════ -->
<div id="disp-screen" class="screen">
  <div class="board-header">
    <span class="board-title">● 九巴班次</span>
    <div class="board-header-btns">
      <span id="last-update"></span>
      <button type="button" id="btn-board-edit">編輯</button>
      <button type="button" id="btn-board-add" title="搜尋路線">

function mockRouteData(route) {
  return MOCK_DB[route] || {

  };
}

const _etaCounters = {};
function mockEtas(stopId, route, dir) {
  const key = `${stopId}:${route}:${dir}`;
  _etaCounters[key] = (_etaCounters[key] || 0) + 1;
  const base = Date.now();
  const offset = (_etaCounters[key] % 5) * 60000;
  const d = dir === 'outbound' ? 'O' : 'I';
  return [
    { dir: d, eta: new Date(base + 2*60000 - offset).toISOString() },
    { dir: d, eta: new Date(base + 9*60000 - offset).toISOString() },
    { dir: d, eta: new Date(base + 18*60000 - offset).toISOString() }
  ];
}

async function mockFetch(url) {
  await new Promise(r => setTimeout(r, 300));
  const u = url.replace('https://data.etabus.gov.hk/v1/transport/kmb/', '');
  const parts = u.split('/');
  if (parts[0] === 'route' && parts.length === 4) {
    const route = parts[1], dirStr = parts[2];
    const db = mockRouteData(route);
    const bound = dirStr === 'outbound' ? 'O' : 'I';
    const v = db.variants.find(x => x.bound === bound);
    if (!v) return { data: null };
    return { data: { route, bound: v.bound, service_type: v.service_type, orig_tc: v.orig_tc, orig_en: v.orig_en, dest_tc: v.dest_tc, dest_en: v.dest_en } };
  }
  if (parts[0] === 'route' && parts.length === 1) {
    const all = [];
    for (const [route, db] of Object.entries(MOCK_DB)) {
      db.variants.forEach(v => all.push({ route, bound: v.bound, service_type: v.service_type, orig_tc: v.orig_tc, orig_en: v.orig_en, dest_tc: v.dest_tc, dest_en: v.dest_en }));
    }
    return { data: all };
  }
  if (parts[0] === 'route-stop') {
    const route = parts[1], dirStr = parts[2];
    const db = mockRouteData(route);
    const bound = dirStr === 'outbound' ? 'O' : 'I';
    if (!db.variants.find(v => v.bound === bound)) return { data: [] };
    return { data: db.stops.map(s => ({ stop: s.stop, seq: s.seq })) };
  }
  if (parts[0] === 'stop') {
    const all = [];
    for (const db of Object.values(MOCK_DB)) db.stops.forEach(s => all.push(s));
    return { data: all };
  }
  if (parts[0] === 'eta') {
    const stopId = parts[1], route = parts[2];
    const item = board.find(b => b.stopId === stopId && b.route === route);
    return { data: mockEtas(stopId, route, item ? item.dir : 'outbound') };
  }
  return { data: [] };
}

async function apiFetch(url) {
  if (MOCK_MODE) return mockFetch(url);
  try {

    if (!r.ok) throw new Error(r.status);

// SCREEN 1 — SELECTION
// ═══════════════════════════════════════════════════════════
async function ensureRouteList() {
  if (routeRegistry) return;
  routeRegistry = new Map();

  const addEntry = (company, route, bound, destTc, destEn, serviceType) => {
    const key = `${company}:${route}`;
    if (!routeRegistry.has(key)) routeRegistry.set(key, []);
    const existing = routeRegistry.get(key);
    const dir = bound === 'O' ? 'outbound' : 'inbound';
    if (!existing.find(e => e.dir === dir)) {
      existing.push({ dir, destTc, destEn, serviceType: serviceType || '1' });
    }
  };

  await Promise.allSettled([
    // KMB
    apiFetch(`${KMB_API}/route/`).then(data => {
      for (const r of (data.data || [])) addEntry('KMB', r.route, r.bound, r.dest_tc, r.dest_en, r.service_type);
    }),
    // CTB — route list has no bound field; each entry encodes both directions:
    //   dest_tc = outbound destination, orig_tc = inbound destination
    apiFetch(`${CTB_API}/route/ctb`).then(data => {
      let added = false;
      for (const r of (data.data || [])) {
        addEntry('CTB', r.route, 'O', r.dest_tc, r.dest_en, '1');
        addEntry('CTB', r.route, 'I', r.orig_tc, r.orig_en, '1');
        if (!allRouteNums.has(r.route)) { allRouteNums.add(r.route); added = true; }
      }
      if (added) { buildPM(); updateNumpad(); }
    })
  ]);
}

function renderSelScreen() {
  typed = '';
  updateNumpad();
  ensureRouteList().then(() => updateMatchList());
}

function updateNumpad() {
  const vn = validNext(typed);

  document.querySelectorAll('#numpad-digits .key[data-k]').forEach(btn => {
    const k = btn.dataset.k;
    if (k === 'CLR' || k === 'BSP') return;
    btn.classList.toggle('dim', !vn.has(k));
  });

  const letters = [...vn].filter(c => /[A-Z]/.test(c)).sort();
  const lettersEl = document.getElementById('numpad-letters');
  lettersEl.innerHTML = '';
  for (const l of letters) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'key letter';
    btn.dataset.k = l;
    btn.textContent = l;
    btn.addEventListener('click', () => pressKey(l));
    lettersEl.appendChild(btn);
  }

  document.getElementById('typed-display').textContent = typed || '_';

  const badge = document.getElementById('valid-badge');
  badge.textContent = isRoute(typed) ? '✓ 有效路線' : '';

  updateMatchList();

  document.getElementById('btn-add-route').classList.toggle('enabled', isRoute(typed));
}

function updateMatchList() {
  const matchesEl = document.getElementById('route-matches');
  matchesEl.innerHTML = '';

  if (!routeRegistry) {
    matchesEl.innerHTML = '<div class="rli-loading">載入路線資料中… <span class="spinner"></span></div>';
    return;
  }

  const matchNums = typed.length > 0
    ? [...allRouteNums].filter(r => r.startsWith(typed)).sort()
    : [...allRouteNums].sort();

  for (const rNum of matchNums) {
    for (const company of ['KMB', 'CTB']) {
      const key = `${company}:${rNum}`;
      if (!routeRegistry.has(key)) continue;
      const dests = routeRegistry.get(key);

      const destHtml = dests.length > 0
        ? dests.map(d => `<span class="rli-dest ${d.dir === 'inbound' ? 'inbound' : ''}">往 ${d.destTc || d.destEn || ''}</span>`).join('')
        : '<span class="rli-dest" style="color:var(--muted)">—</span>';

      const row = document.createElement('div');
      row.className = 'rli';
      row.innerHTML = `<span class="rli-num">${rNum}</span><span class="rli-company rli-${company.toLowerCase()}">${company}</span><div class="rli-dests">${destHtml}</div>`;
      row.addEventListener('click', () => {
        typed = rNum;
        updateNumpad();
        stopRefresh();
        stopScreenOrigin = 'sel';
        openStopScreen(rNum, company);
      });
      matchesEl.appendChild(row);
    }
  }
}

function pressKey(k) {
  if (k === 'CLR') {
    typed = '';
  } else if (k === 'BSP') {
    typed = typed.slice(0, -1);
  } else {
    const next = typed + k;
    if (PM.has(next) || KMB_ROUTES.includes(next)) typed = next;
  }
  updateNumpad();
}

// SCREEN 2 — STOP PICKER
// ═══════════════════════════════════════════════════════════
async function openStopScreen(route, company = 'KMB', preselectDir = null) {
  pendingRoute = { route, company, variants: [] };
  pendingDir = null;
  document.getElementById('stop-route-label').textContent = route;
  document.getElementById('stop-list').innerHTML = '<div class="stop-loading">載入中… <span class="spinner"></span></div>';
  showScreen('stop-screen');

  try {
    let variants = [];

    if (company === 'KMB') {
      const combos = [['outbound','1'],['inbound','1'],['outbound','2'],['inbound','2']];
      const results = await Promise.allSettled(
        combos.map(([d, st]) => apiFetch(`${KMB_API}/route/${route}/${d}/${st}`))
      );
      variants = results
        .filter(r => r.status === 'fulfilled' && r.value.data)
        .map(r => r.value.data)
        .filter(v => v && v.route)
        .map(v => ({
          dir: v.bound === 'O' ? 'outbound' : 'inbound',
          serviceType: v.service_type,
          destTc: v.dest_tc,
          destEn: v.dest_en
        }))
        .filter((v, _, arr) => arr.findIndex(x => x.dir === v.dir) === arr.indexOf(v));
    } else {
      // CTB: probe both directions via route-stop API (route list may be incomplete)
      const [outRes, inRes] = await Promise.allSettled([
        apiFetch(`${CTB_API}/route-stop/ctb/${route}/outbound`),
        apiFetch(`${CTB_API}/route-stop/ctb/${route}/inbound`)
      ]);
      const regEntries = (routeRegistry && routeRegistry.get(`CTB:${route}`)) || [];
      variants = [];
      if (outRes.status === 'fulfilled' && (outRes.value.data || []).length > 0) {
        const reg = regEntries.find(e => e.dir === 'outbound');
        variants.push({ dir: 'outbound', serviceType: '1', destTc: reg?.destTc || '', destEn: reg?.destEn || '' });
      }
      if (inRes.status === 'fulfilled' && (inRes.value.data || []).length > 0) {
        const reg = regEntries.find(e => e.dir === 'inbound');
        variants.push({ dir: 'inbound', serviceType: '1', destTc: reg?.destTc || '', destEn: reg?.destEn || '' });
      }
      if (variants.length === 0) variants = regEntries.map(e => ({ dir: e.dir, serviceType: '1', destTc: e.destTc, destEn: e.destEn }));
    }

    pendingRoute.variants = variants;

    const tabsEl = document.getElementById('dir-tabs');
    tabsEl.innerHTML = '';
    const dirs = [...new Set(variants.map(v => v.dir))];
    const initialDir = preselectDir && dirs.includes(preselectDir) ? preselectDir : dirs[0];

    dirs.forEach(dir => {
      const v = variants.find(x => x.dir === dir);
      const label = '往 ' + (v.destTc || v.destEn || dir);
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'dir-tab' + (dir === initialDir ? ' active' : '');
      btn.dataset.dir = dir;
      btn.textContent = label;
      btn.addEventListener('click', () => {
        tabsEl.querySelectorAll('.dir-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadStops(route, dir);
      });
      tabsEl.appendChild(btn);
    });

    if (initialDir) await loadStops(route, initialDir);
  } catch (e) {
    document.getElementById('stop-list').innerHTML =
      '<div class="stop-loading" style="color:var(--red)">載入失敗，請檢查網絡</div>';
  }
}

async function ensureStopCache() {
  if (stopCache) return;
  const data = await apiFetch(`${KMB_API}/stop`);
  stopCache = new Map();
  for (const s of (data.data || [])) {
    stopCache.set(s.stop, { name_tc: s.name_tc, name_en: s.name_en });
  }
}

async function loadStops(route, dir) {
  const company = pendingRoute.company;
  pendingDir = dir;
  expandedStopId   = null;
  stopETAs         = new Map();
  activeEtaRoute   = route;
  activeEtaCompany = company;
  activeEtaDir     = dir;
  const variant = pendingRoute.variants.find(v => v.dir === dir) || { serviceType: '1', destTc: '', destEn: '' };
  activeEtaStype  = variant.serviceType;
  activeEtaDestTc = variant.destTc || variant.destEn || '';

  const listEl = document.getElementById('stop-list');
  listEl.innerHTML = '<div class="stop-loading">載入站點中… <span class="spinner"></span></div>';

  try {
    if (company === 'KMB') {
      const [stopsData] = await Promise.all([
        apiFetch(`${KMB_API}/route-stop/${route}/${dir}/${variant.serviceType}`),
        ensureStopCache()
      ]);
      const stops = stopsData.data || [];
      if (stops.length === 0) { listEl.innerHTML = '<div class="stop-loading">此方向暫無站點資料</div>'; return; }
      currentStopList = stops.map(s => {
        const raw = stopCache.get(s.stop) || { name_tc: s.stop, name_en: '' };
        return { stop: s.stop, seq: s.seq, name_tc: cleanName(raw.name_tc), name_en: cleanName(raw.name_en) };
      });
    } else {
      // CTB — route-stop then fetch each stop name individually
      const stopsData = await apiFetch(`${CTB_API}/route-stop/ctb/${route}/${dir}`);
      const stops = stopsData.data || [];
      if (stops.length === 0) { listEl.innerHTML = '<div class="stop-loading">此方向暫無站點資料</div>'; return; }
      const nameResults = await Promise.allSettled(
        stops.map(s => {
          if (ctbStopCache.has(s.stop)) return Promise.resolve(ctbStopCache.get(s.stop));
          return apiFetch(`${CTB_API}/stop/${s.stop}`).then(d => {
            const info = { name_tc: d.data?.name_tc || s.stop, name_en: d.data?.name_en || '' };
            ctbStopCache.set(s.stop, info);
            return info;
          });
        })
      );
      currentStopList = stops.map((s, i) => {
        const raw = nameResults[i].status === 'fulfilled' ? nameResults[i].value : { name_tc: s.stop, name_en: '' };
        return { stop: s.stop, seq: s.seq, name_tc: cleanName(raw.name_tc), name_en: cleanName(raw.name_en) };
      });
    }

    renderStopList();
    fetchAllStopETAs();
  } catch (e) {
    listEl.innerHTML = '<div class="stop-loading" style="color:var(--red)">載入失敗，請檢查網絡</div>';
  }
}

function renderStopList() {
  const listEl = document.getElementById('stop-list');
  listEl.innerHTML = '';

  for (const s of currentStopList) {
    const etas = stopETAs.has(s.stop) ? stopETAs.get(s.stop) : null; // null = not yet loaded
    const isExpanded = s.stop === expandedStopId;

    // Mini ETA badge (when collapsed)
    let miniEta = '';
    if (!isExpanded) {
      if (etas === null) {
        miniEta = '<span class="stop-eta-mini loading">…</span>';
      } else if (etas.length > 0) {
        const m = etas[0];
        const cls = m <= 0 ? 'now' : m <= 3 ? 'soon' : '';
        miniEta = `<span class="stop-eta-mini ${cls}">${m <= 0 ? '即將' : m + '分'}</span>`;
      }
    }

    // Expanded ETA detail
    let etaDetail = '';
    if (isExpanded) {
      if (etas === null) {
        etaDetail = '<div class="stop-eta-detail"><span class="stop-eta-mini loading">載入中… <span class="spinner"></span></span></div>';
      } else if (etas.length === 0) {
        etaDetail = '<div class="stop-eta-detail"><span style="color:var(--muted);font-size:0.82rem;">暫無班次</span></div>';
      } else {
        const pills = etas.map(m => {
          if (m <= 0) return '<span class="eta-pill now">即將抵達</span>';
          if (m <= 3) return `<span class="eta-pill soon">${m} 分鐘</span>`;
          return `<span class="eta-pill">${m} 分鐘</span>`;
        }).join('');
        etaDetail = `<div class="stop-eta-detail">${pills}</div>`;
      }
    }

    const div = document.createElement('div');
    div.className = 'stop-item' + (isExpanded ? ' stop-expanded' : '');
    div.dataset.stopId = s.stop;
    div.innerHTML = `
      <div class="stop-item-row">
        <span class="stop-seq">${s.seq}</span>
        <div class="stop-names">
          <div class="stop-name-tc">${s.name_tc}</div>
          ${isExpanded ? `<div class="stop-name-en">${s.name_en}</div>` : ''}
        </div>
        ${miniEta}
        <button type="button" class="stop-star" title="設為常用">☆</button>
      </div>
      ${etaDetail}
    `;

    div.addEventListener('click', e => {
      if (e.target.closest('.stop-star')) return;
      expandedStopId = (expandedStopId === s.stop) ? null : s.stop;
      renderStopList();
      if (expandedStopId) {
        const el = document.querySelector(`[data-stop-id="${expandedStopId}"]`);
        if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 30);
      }
    });

    div.querySelector('.stop-star').addEventListener('click', e => {
      e.stopPropagation();
      addBoardItem(activeEtaRoute, activeEtaCompany, activeEtaDir, activeEtaStype, s.stop, +s.seq, s.name_tc, activeEtaDestTc, true);
    });

    listEl.appendChild(div);
  }

  // Opposite direction tile at bottom
  const oppVariant = pendingRoute && pendingRoute.variants.find(v => v.dir !== activeEtaDir);
  if (oppVariant) {
    const oppDest = oppVariant.destTc || oppVariant.destEn || (oppVariant.dir === 'outbound' ? '去程' : '回程');
    const flipDiv = document.createElement('div');
    flipDiv.className = 'stop-flip-tile';
    flipDiv.innerHTML = `
      <span class="stop-flip-arrow">↔</span>
      <div class="stop-flip-info">
        <span class="stop-flip-label">切換方向</span>
        <span class="stop-flip-dest">往 ${oppDest}</span>
      </div>`;
    flipDiv.addEventListener('click', () => {
      document.getElementById('dir-tabs').querySelectorAll('.dir-tab').forEach(b => {
        b.classList.toggle('active', b.dataset.dir === oppVariant.dir);
      });
      loadStops(pendingRoute.route, oppVariant.dir);
    });
    listEl.appendChild(flipDiv);
  }
}

async function fetchAllStopETAs() {
  const token   = ++etaFetchToken;
  const route   = activeEtaRoute;
  const company = activeEtaCompany;
  const dir     = activeEtaDir;
  const stype   = activeEtaStype;
  const dirCode = dir === 'outbound' ? 'O' : 'I';

  const results = await Promise.allSettled(
    currentStopList.map(s => {
      const url = company === 'CTB'
        ? `${CTB_API}/eta/ctb/${s.stop}/${route}`
        : `${KMB_API}/eta/${s.stop}/${route}/${stype}`;
      return apiFetch(url).then(data => {
        const now = Date.now();
        const etas = (data.data || [])
          .filter(r => r.dir === dirCode && r.eta)
          .slice(0, 3)
          .map(r => Math.round((new Date(r.eta).getTime() - now) / 60000));
        return { stopId: s.stop, etas };
      });
    })
  );

  if (token !== etaFetchToken) return; // stale — direction changed

  // Store results (failed = empty array)
  for (const [i, r] of results.entries()) {
    if (r.status === 'fulfilled') {
      stopETAs.set(r.value.stopId, r.value.etas);
    } else {
      stopETAs.set(currentStopList[i].stop, []);
    }
  }

  // Auto-expand the stop with the nearest arriving bus
  if (!expandedStopId) {
    let minMins = Infinity, nearestId = null;
    for (const s of currentStopList) {
      const etas = stopETAs.get(s.stop);
      if (etas && etas.length > 0 && etas[0] < minMins) {
        minMins = etas[0];
        nearestId = s.stop;
      }
    }
    if (nearestId) expandedStopId = nearestId;
  }

  renderStopList();

  // Scroll auto-expanded stop into view
  if (expandedStopId) {
    const el = document.querySelector(`[data-stop-id="${expandedStopId}"]`);
    if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 60);
  }
}

function addBoardItem(route, company, dir, serviceType, stopId, stopSeq, stopName, destTc, starred = false) {
  const dup = board.find(b => b.route === route && b.company === company && b.dir === dir && b.stopId === stopId);
  if (!dup) {
    board.push({ route, company, dir, serviceType, stopId, stopSeq, stopName, destTc, starred });
    saveBoard();
  } else if (starred && !dup.starred) {
    dup.starred = true;
    saveBoard();
  }
  typed = '';
  showBoardScreen();
}

// ═══════════════════════════════════════════════════════════
// SCREEN 3 — DISPLAY BOARD
// ═══════════════════════════════════════════════════════════
function showBoardScreen() {
  editMode = false;
  renderBoard();
  showScreen('disp-screen');
  startRefresh();
}

function renderBoard() {
  document.getElementById('btn-board-edit').textContent = '編輯';
  const el = document.getElementById('board-rows');
  el.classList.remove('edit-mode');

  if (board.length === 0) {
    el.innerHTML = '<div class="board-empty">未有路線。<br>點擊「＋ 新增」以新增路線。</div>';
    return;
  }

  el.innerHTML = board.map((item, i) => `
    <div class="board-card${item.starred ? ' starred-card' : ''}" data-idx="${i}">
      <div class="board-card-top">
        <span class="board-route">${item.route}</span>
        <span class="board-company board-${(item.company||'KMB').toLowerCase()}">${item.company||'KMB'}</span>
        <span class="board-dest">往 ${item.destTc || '—'}</span>
      </div>
      <div class="board-card-stop">${item.stopName} &bull; 第 ${item.stopSeq} 站</div>
      <div class="board-etas" id="etas-${i}">
        <span class="eta-pill no-data">載入中…</span>
      </div>
      <button type="button" class="board-star${item.starred ? ' starred' : ''}" data-idx="${i}" title="${item.starred ? '取消常用' : '設為常用'}">${item.starred ? '★' : '☆'}</button>
      <button type="button" class="board-del" data-idx="${i}">✕ 移除</button>
    </div>
  `).join('');

  el.querySelectorAll('.board-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.board-star, .board-del')) return;
      const i = +card.dataset.idx;
      const item = board[i];
      stopRefresh();
      stopScreenOrigin = 'board';
      openStopScreen(item.route, item.company || 'KMB', item.dir);
    });
  });

  el.querySelectorAll('.board-star').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const i = +btn.dataset.idx;
      board[i].starred = !board[i].starred;
      saveBoard();
      renderBoard();
    });
  });

  el.querySelectorAll('.board-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      board.splice(+btn.dataset.idx, 1);
      saveBoard();
      renderBoard();
      startRefresh();
    });
  });
}

async function refreshETAs() {
  await Promise.allSettled(board.map((_, i) => fetchETA(i)));
  const now = new Date();
  document.getElementById('last-update').textContent =
    `更新 ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
}

async function fetchETA(idx) {
  const item = board[idx];
  const etasEl = document.getElementById(`etas-${idx}`);
  if (!etasEl) return;

  try {
    const url = (item.company || 'KMB') === 'CTB'
      ? `${CTB_API}/eta/ctb/${item.stopId}/${item.route}`
      : `${KMB_API}/eta/${item.stopId}/${item.route}/${item.serviceType}`;
    const data = await apiFetch(url);
    const dirCode = item.dir === 'outbound' ? 'O' : 'I';
    const rows = (data.data || []).filter(r => r.dir === dirCode && r.eta);

    if (rows.length === 0) {
      etasEl.innerHTML = '<span class="eta-pill no-data">暫無班次</span>';
      return;
    }

    const now = Date.now();
    etasEl.innerHTML = rows.slice(0, 3).map(r => {
      const mins = Math.round((new Date(r.eta).getTime() - now) / 60000);
      if (mins <= 0) return '<span class="eta-pill now">即將抵達</span>';
      if (mins <= 3) return `<span class="eta-pill soon">${mins} 分鐘</span>`;
      return `<span class="eta-pill">${mins} 分鐘</span>`;
    }).join('');
  } catch (e) {
    if (etasEl) etasEl.innerHTML = '<span class="eta-pill no-data">—</span>';
  }
}

function startRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshETAs();
  refreshTimer = setInterval(refreshETAs, 15000);
}

function stopRefresh() {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
}

function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('board-rows').classList.toggle('edit-mode', editMode);
  document.getElementById('btn-board-edit').textContent = editMode ? '完成' : '編輯';
}

// ═══════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════
document.querySelectorAll('#numpad-digits .key').forEach(btn => {
  btn.addEventListener('click', () => pressKey(btn.dataset.k));
});

document.getElementById('btn-add-route').addEventListener('click', () => {
  if (!isRoute(typed)) return;
  stopRefresh();
  stopScreenOrigin = 'sel';
  const company = KMB_ROUTE_SET.has(typed) ? 'KMB' : 'CTB';
  openStopScreen(typed, company);
});

document.getElementById('btn-goto-board').addEventListener('click', showBoardScreen);

document.getElementById('stop-back').addEventListener('click', () => {
  if (stopScreenOrigin === 'board') {
    showBoardScreen();
  } else {
    showScreen('sel-screen');
    renderSelScreen();
  }
});

document.getElementById('stop-home').addEventListener('click', () => {
  showBoardScreen();
});

document.getElementById('btn-board-add').addEventListener('click', () => {
  stopRefresh();
  showScreen('sel-screen');
  renderSelScreen();
});

document.getElementById('btn-board-edit').addEventListener('click', toggleEditMode);

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
loadBoard();
renderSelScreen();
if (board.length > 0) showBoardScreen();
</script>
